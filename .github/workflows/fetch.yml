name: Fetch Prices

on:
  schedule:
    # 한국장 마감 후 (KST 16:00 = UTC 07:00), 평일만
    - cron: "0 7 * * 1-5"
    # 미국장 마감 후 (EST 17:00 = UTC 21:00), 평일만
    - cron: "0 21 * * 1-5"
  workflow_dispatch: # 수동 실행 버튼

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch prices
        run: python cap_prices.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "price update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
